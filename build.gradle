plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    mavenCentral()
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = "https://jitpack.io" }
    maven { url = "https://maven.quiltmc.org/repository/release/" }
    maven { url "https://maven.isxander.dev/releases" }        // YACL — correct URL
    maven { url "https://maven.terraformersmc.com/releases" }  // ModMenu — correct URL
    maven { url "https://cursemaven.com" }                      // CurseForge
    maven { url "https://maven.caffeinemc.net/" }               // Sodium/Iris
    maven { url "https://api.modrinth.com/maven" }              // Modrinth
}

dependencies {
    // Core Minecraft & Fabric
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    
    // YACL - Yet Another Config Lib
    modImplementation "dev.isxander:yet-another-config-lib:${project.yacl_version}"
    include "dev.isxander:yet-another-config-lib:${project.yacl_version}"
    
    // ModMenu - standard Fabric mod list integration
    modImplementation "com.terraformersmc:modmenu:${project.modmenu_version}"
    
    // Performance Compat (Optional at Runtime)
    modImplementation "maven.modrinth:sodium:mc1.20.1-0.5.11"
    // Iris if needed, but the snippet used Sodium API.

    // FastUtil - high-performance collections (bundled)
    include implementation("it.unimi.dsi:fastutil:${project.fastutil_version}")
    
    // MixinExtras for safe, chainable injections (bundled)
    include(implementation(annotationProcessor(
        "io.github.llamalad7:mixinextras-fabric:${project.mixinextras_version}"
    )))
    
    // Testing dependencies - only JUnit/Mockito, no Minecraft dependencies
    testImplementation "org.junit.jupiter:junit-jupiter:${project.junit_version}"
    testImplementation "org.mockito:mockito-core:${project.mockito_version}"
    testImplementation "org.mockito:mockito-junit-jupiter:${project.mockito_version}"
}

processResources {
    inputs.property "version", project.version
    
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 17
    it.options.compilerArgs.add('--add-modules=jdk.incubator.vector')
}

java {
    withSourcesJar()
    
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
    
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.archives_base_name}" }
    }
}

// Loom test configuration
loom {
    runs {
        testClient {
            client()
            name = "Test Client"
            source = sourceSets.test
        }
    }
}

// Publishing configuration
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
